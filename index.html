<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Lisk</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@200..700&family=Playwrite+PT+Guides&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body>
    <div class="main-container">
        <h1 class="title">Task List</h1>

        <div class="task-container">
            <div class="input-container">
                <input class="task-input" id="task-input" type="text" placeholder="Lavar la ropa">
                <button class="add-task-button" id="add-button">Add task</button>
            </div>
            
            <h2 class="error-message" id="error-message">Hola</h2>
            <ul class="task-list" id="task-list">
                <li id="firts-element">Welcome 😀
                    <button id="remove-button" class="remove-button">X</button>
                </li>
            </ul>
        </div>
    </div>
    <script src="scripts/index.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => {
          console.log('Service Worker registrado.');
        }).catch((error) => {
          console.log('Error al registrar el Service Worker:', error);
        });
      }
    </script>
</body>
</html>
