<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@200..700&family=Playwrite+PT+Guides&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <title>Lista de tareas</title>
</head>
<body>
    <div class="main-container">
        <div class="textsContainer">
            <h1 class="title">Lista de tareas</h1>
            <p id="error">Maximo de tareas alcanzado</p>
        </div>

        <div class="inputsContainer">
            <input type="text" id="taskInput" placeholder="Agrega una tarea">
            <button id="addBtn">Agregar</button>
        </div>

        <ul id="taskList">
        </ul>
    </div>
    <script src="scripts/index.js"></script>
</body>
</html>
